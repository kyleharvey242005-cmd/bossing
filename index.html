<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>All About Us Boss 🖤</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --text-dark: #111111;
            --text-light: #666666;
            --accent: #000000; 
            --subtitle: #555555; 
            --border-light: #e2e8f0; 
            --button-hover: #333333; 
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #ffffff, #e0e0e0); 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            color: var(--text-dark);
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'><text y='24' font-size='24'>🖤</text></svg>") 16 16, auto;
        }

        .gallery-bg {
            background-color: #fcfcfc; 
            background-image: 
                url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><text x='15' y='30' font-size='20' opacity='0.15'>🖤</text><text x='65' y='80' font-size='15' opacity='0.2'>✨</text><text x='40' y='60' font-size='12' opacity='0.3'>🤍</text></svg>"),
                linear-gradient(rgba(0, 0, 0, 0.04) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.04) 2px, transparent 2px);
            background-size: 100px 100px, 40px 40px, 40px 40px;
            animation: waveGrid 12s linear infinite;
        }

        @keyframes waveGrid {
            0% { background-position: 0px 0px, 0px 0px, 0px 0px; }
            100% { background-position: 200px 200px, 200px 200px, 200px 200px; }
        }
        
        #login-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08); 
            text-align: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
            z-index: 10;
            width: 85%;
            max-width: 420px;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        #login-section h2 { 
            margin-top: 0; 
            font-family: 'Great Vibes', cursive; 
            font-size: 3.5rem;
            color: var(--accent); 
            margin-bottom: 5px;
        }

        #login-section p.subtitle {
            color: var(--subtitle); 
            font-size: 0.95rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .input-container {
            position: relative;
            width: 100%;
            margin: 10px 0 25px 0;
        }
        
        input {
            padding: 15px;
            padding-right: 50px; 
            border: 2px solid var(--border-light); 
            border-radius: 12px;
            width: 100%;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            text-align: center;
            color: var(--text-dark);
            margin: 0;
        }

        input:focus { 
            border-color: var(--accent); 
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .toggle-eye {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            transition: color 0.3s;
        }

        .toggle-eye:hover { color: var(--accent); }
        
        button.primary-btn {
            background-color: var(--accent); 
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button.primary-btn:hover { 
            transform: translateY(-2px); 
            background-color: var(--button-hover); 
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        
        #error-msg {
            color: #111111; 
            font-size: 0.9em;
            display: none; 
            margin-top: 15px;
            font-weight: 700;
        }
        
        #gallery-section {
            display: none; 
            width: 100%;
            max-width: 1200px;
            padding: 40px 15px;
            box-sizing: border-box;
            animation: fadeIn 1s ease-in-out;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gallery-header h3 {
            color: var(--text-light); 
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
            font-weight: 700;
        }
        .gallery-header h1 {
            font-size: 2.8rem;
            margin: 0 0 10px 0;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
        }
        .gallery-header h1 span {
            font-family: 'Great Vibes', cursive; 
            color: var(--accent); 
        }
        .gallery-header p {
            color: var(--subtitle); 
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .category-menu {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            overflow-x: auto; 
            padding-bottom: 10px;
            white-space: nowrap;
            -ms-overflow-style: none; scrollbar-width: none; 
        }
        .category-menu::-webkit-scrollbar { display: none; }

        .category-btn {
            background: rgba(255, 255, 255, 0.6); 
            border: 2px solid transparent;
            color: var(--text-dark);
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .category-btn:hover { border-color: var(--border-light); }
        .category-btn.active {
            background: var(--accent); 
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .carousel-container {
            position: relative;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px; 
            margin-bottom: 30px;
            touch-action: pan-y; 
        }

        .carousel-card {
            position: absolute;
            width: 300px;
            height: 400px;
            border-radius: 20px;
            background-color: #fff;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            transition: transform 0.5s cubic-bezier(0.25, 0.8, 0.25, 1), opacity 0.5s, filter 0.5s;
            overflow: hidden;
            cursor: pointer;
            left: calc(50% - 150px);
            border: 5px solid white; 
        }

        .carousel-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none; 
        }

        .carousel-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .nav-btn {
            background: white;
            border: none;
            color: var(--text-dark);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .nav-btn:hover { background: var(--accent); color: white; transform: scale(1.1); }

        #lightbox {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(10, 10, 10, 0.95); 
            z-index: 1000;
            display: none; 
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 70vh;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 5px solid white; 
        }

        #lightbox .desc {
            color: white;
            margin-top: 20px;
            text-align: center;
            font-family: 'Great Vibes', cursive;
            font-size: 2.8rem;
            padding: 0 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,1);
        }

        #lightbox .close-btn {
            position: absolute;
            top: 30px; right: 30px;
            background: transparent; border: none;
            color: white; font-size: 3rem;
            cursor: pointer;
            transition: transform 0.3s;
        }
        #lightbox .close-btn:hover { transform: scale(1.2) rotate(90deg); color: #888888; }

        @media (max-width: 600px) {
            .carousel-card { width: 240px; height: 350px; left: calc(50% - 120px); }
            .gallery-header h1 { font-size: 2rem; }
            #lightbox .desc { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="boss.MP3" type="audio/mpeg">
    </audio>

    <div id="login-section">
        <h2>Favorite Person 🖤</h2>
        <p class="subtitle">Enter your full name to unlock our visual diary.</p>
        
        <div class="input-container">
            <input type="password" id="password-input" placeholder="Enter your full name">
            <span class="toggle-eye" id="toggle-eye" title="Show Password">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </span>
        </div>
        
        <button class="primary-btn" onclick="checkPassword()">Unlock Memories</button>
        <p id="error-msg">Oops, that's not it! Try again boss 🖤</p>
    </div>

    <div id="gallery-section">
        <div class="gallery-header">
            <h3>HOLD MY HAND, BOSS</h3>
            <h1><span>Only Us Web</span></h1>
            <p>Enjoying this life with you.</p>
        </div>
        <div class="category-menu" id="category-menu"></div>
        <div class="carousel-container" id="carousel-container"></div>
        <div class="carousel-controls">
            <button class="nav-btn" onclick="prevSlide()">&#8592;</button>
            <button class="nav-btn" onclick="nextSlide()">&#8594;</button>
        </div>
    </div>

    <div id="lightbox">
        <button class="close-btn" onclick="closeLightbox()">&times;</button>
        <img id="lightbox-img" src="" alt="Maximized">
        <div class="desc" id="lightbox-desc">Description goes here</div>
    </div>

    <script>
        const memoryData = [
            //Only Us boss2
            { src: 'boss5.jpeg', category: 'Only Us', desc: 'You and me against the world.' },
             { src: 'boss3.jpeg', category: 'Only Us', desc: 'You and me against the world.' },
             { src: 'boss2.1.jpg', category: 'Only Us', desc: 'You and me against the world.' },
              { src: 'boss2.2.jpg', category: 'Only Us', desc: 'You and me against the world.' },

            //Adventure boss4
            { src: 'boss2.jpeg', category: 'Adventures', desc: 'Exploring new places together.' },

            //foods boss3
            { src: 'boss3.1.jpg', category: 'Foods', desc: 'Food always tastes better with you.' },

            //Happy Monments boss5
            { src: 'boss4.jpeg', category: 'Happy Moments', desc: 'Smiles that I want to protect forever.' },


            //Only you "boss1"
            { src: 'boss1.jpeg', category: 'Only You', desc: 'My absolute favorite view.' },
            { src: 'boss1.1.jpg', category: 'Only You', desc: 'My absolute favorite view.' },
           { src: 'boss1.2.jpg', category: 'Only You', desc: 'My absolute favorite view.' },
           { src: 'boss2.jpeg', category: 'Only You', desc: 'My absolute favorite view.' },
           { src: 'boss1.3.jpeg', category: 'Only You', desc: 'My absolute favorite view.' },
            { src: 'boss1.4.jpeg', category: 'Only You', desc: 'My absolute favorite view.' },
             { src: 'boss1.5.jpeg', category: 'Only You', desc: 'My absolute favorite view.' },
              { src: 'boss1.6.jpeg', category: 'Only You', desc: 'My absolute favorite view.' },
                 { src: 'boss1.7.jpeg', category: 'Only You', desc: 'My absolute favorite view.' },
                    { src: 'boss1.8.jpeg', category: 'Only You', desc: 'My absolute favorite view.' },
                       { src: 'boss1.9.jpeg', category: 'Only You', desc: 'My absolute favorite view.' },




            { src: 'boss6.jpeg', category: 'Only Me', desc: 'Thinking about our next date.' }
        ];

        const categories = ["All", ...new Set(memoryData.map(m => m.category))];

        let currentActiveCategory = "All";
        let filteredMemories = [...memoryData]; 
        let currentIndex = 0;
        let isMusicPlaying = false;
        let autoPlayTimer; 

        // --- THE CUSTOM NAME PUZZLE LOGIC ---
        const toggleEye = document.getElementById('toggle-eye');
        const passwordInput = document.getElementById('password-input');
        let originalTypedName = "";
        let isShowingHint = false;

        toggleEye.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text'; // Reveal the text
                
                // We check if he typed his exact name (case-insensitive just in case he didn't capitalize properly)
                const typedText = passwordInput.value.trim().toLowerCase();
                const secretTargetName = "eddie cabansag jr."; 
                
                if (typedText === secretTargetName) {
                    originalTypedName = passwordInput.value; // Save his name
                    passwordInput.value = 'The password is "boss"'; // Show the hint instead!
                    isShowingHint = true;
                } else {
                    isShowingHint = false; // It's someone else, just show what they typed normally
                }
                
                // Change to Eye-Closed icon
                toggleEye.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>';
                toggleEye.style.color = "var(--accent)"; 
            } else {
                // Turn it back into hidden dots
                passwordInput.type = 'password';
                
                // If we were showing the hint, put his original name back in the box behind the scenes
                if (isShowingHint) {
                    passwordInput.value = originalTypedName;
                    isShowingHint = false;
                }
                
                // Change back to Eye-Open icon
                toggleEye.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>';
                toggleEye.style.color = "var(--text-light)";
            }
        });
        // ------------------------------------

        function checkPassword() {
            const correctPassword = "boss"; 
            const hintPhrase = 'The password is "boss"';
            const entered = document.getElementById("password-input").value;
            
            // Unlocks if he types "boss" OR if he hits enter while looking at the hint phrase!
            if (entered.toLowerCase() === correctPassword.toLowerCase() || entered === hintPhrase) {
                
                if(!isMusicPlaying) {
                    document.getElementById('bg-music').play();
                    isMusicPlaying = true;
                }

                startHearts();
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]); 

                const loginBox = document.getElementById("login-section");
                loginBox.style.opacity = "0";
                
                setTimeout(() => {
                    loginBox.style.display = "none";
                    document.getElementById("gallery-section").style.display = "block";
                    document.body.classList.add("gallery-bg");
                    initGallery();
                }, 500); 
            } else {
                document.getElementById("error-msg").style.display = "block";
                if (navigator.vibrate) navigator.vibrate(300);
            }
        }

        function startHearts() {
            setInterval(() => {
                const heart = document.createElement("div");
                heart.classList.add("heart");
                const emojis = ["🖤", "🤍", "✨", "❕", "💭"];
                heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                
                heart.style.position = "fixed";
                heart.style.bottom = "-10vh";
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.fontSize = "1.5rem";
                heart.style.opacity = "0.7";
                heart.style.zIndex = "5";
                heart.style.pointerEvents = "none";
                
                const duration = Math.random() * 4 + 3;
                heart.style.animation = `floatUp ${duration}s linear forwards`;
                
                document.body.appendChild(heart);
                setTimeout(() => { heart.remove(); }, duration * 1000);
            }, 300);
        }

        function initGallery() {
            renderCategories();
            renderCarousel();
            setupSwipe();
            startAutoPlay(); 
        }

        function renderCategories() {
            const menu = document.getElementById("category-menu");
            menu.innerHTML = "";
            categories.forEach(cat => {
                const btn = document.createElement("button");
                btn.className = `category-btn ${cat === currentActiveCategory ? "active" : ""}`;
                btn.innerText = cat;
                btn.onclick = () => filterGallery(cat);
                menu.appendChild(btn);
            });
        }

        function filterGallery(category) {
            currentActiveCategory = category;
            if (category === "All") {
                filteredMemories = [...memoryData];
            } else {
                filteredMemories = memoryData.filter(m => m.category === category);
            }
            currentIndex = 0; 
            renderCategories(); 
            renderCarousel();   
            startAutoPlay(); 
        }

        function renderCarousel() {
            const container = document.getElementById("carousel-container");
            container.innerHTML = ""; 

            if(filteredMemories.length === 0) {
                container.innerHTML = "<p style='font-weight: 600; color: #666666;'>No photos here yet! 🖤</p>";
                return;
            }

            filteredMemories.forEach((memory, index) => {
                const card = document.createElement("div");
                card.className = "carousel-card";
                card.id = `card-${index}`;
                
                const img = document.createElement("img");
                img.src = memory.src;
                card.appendChild(img);
                
                card.onclick = () => {
                    if (index === currentIndex) {
                        openLightbox(memory);
                    } else {
                        currentIndex = index;
                        updateCarouselPositions();
                        startAutoPlay(); 
                    }
                };
                container.appendChild(card);
            });
            updateCarouselPositions();
        }

        function updateCarouselPositions() {
            const cards = document.querySelectorAll(".carousel-card");
            cards.forEach((card, index) => {
                const offset = index - currentIndex;
                if (offset === 0) {
                    card.style.transform = `translateX(0) scale(1) translateZ(0)`;
                    card.style.zIndex = 10;
                    card.style.opacity = 1;
                    card.style.filter = "brightness(1)";
                } else if (offset === 1 || offset === -1) {
                    const direction = offset === 1 ? 1 : -1;
                    card.style.transform = `translateX(${direction * 65}%) scale(0.8) translateZ(-100px)`;
                    card.style.zIndex = 5;
                    card.style.opacity = 0.8;
                    card.style.filter = "brightness(0.6)";
                } else {
                    const direction = offset > 1 ? 1 : -1;
                    card.style.transform = `translateX(${direction * 120}%) scale(0.6) translateZ(-200px)`;
                    card.style.zIndex = 1;
                    card.style.opacity = 0;
                }
            });
        }

        function startAutoPlay() {
            clearInterval(autoPlayTimer); 
            autoPlayTimer = setInterval(() => {
                if (filteredMemories.length > 1) {
                    currentIndex = (currentIndex + 1) % filteredMemories.length;
                    updateCarouselPositions();
                }
            }, 2500); 
        }

        function stopAutoPlay() { clearInterval(autoPlayTimer); }

        function nextSlide() {
            if (filteredMemories.length > 1) {
                currentIndex = (currentIndex + 1) % filteredMemories.length; 
                updateCarouselPositions();
                startAutoPlay(); 
                if (navigator.vibrate) navigator.vibrate(50); 
            }
        }

        function prevSlide() {
            if (filteredMemories.length > 1) {
                currentIndex = (currentIndex - 1 + filteredMemories.length) % filteredMemories.length; 
                updateCarouselPositions();
                startAutoPlay(); 
                if (navigator.vibrate) navigator.vibrate(50);
            }
        }

        let startX = 0;
        function setupSwipe() {
            const container = document.getElementById("carousel-container");
            container.addEventListener('touchstart', e => { startX = e.changedTouches[0].screenX; });
            container.addEventListener('touchend', e => {
                const endX = e.changedTouches[0].screenX;
                const difference = startX - endX;
                if (difference > 50) nextSlide(); 
                if (difference < -50) prevSlide(); 
            });
        }

        function openLightbox(memory) {
            stopAutoPlay(); 
            const lightbox = document.getElementById("lightbox");
            const img = document.getElementById("lightbox-img");
            const desc = document.getElementById("lightbox-desc");
            img.src = memory.src;
            desc.innerText = memory.desc;
            lightbox.style.display = "flex";
            setTimeout(() => { lightbox.style.opacity = "1"; }, 10);
            if (navigator.vibrate) navigator.vibrate(100); 
        }

        function closeLightbox() {
            const lightbox = document.getElementById("lightbox");
            lightbox.style.opacity = "0";
            setTimeout(() => { lightbox.style.display = "none"; }, 400);
            startAutoPlay(); 
        }
    </script>
</body>
</html>
